name: CI

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:

permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
  actions: write
  contents: read

jobs:
  EcoSISTEM-tests:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      matrix:
        julia-version:
          - '1.11'
          - '1'
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        R-version:
          - 'release'
        arch:
          - x64
          - arm64
        experimental:
          - false
        exclude:
          - os: macOS-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: arm64
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Set up julia
      uses: julia-actions/setup-julia@v3
      with:
        version: ${{ matrix.julia-version }}
        arch: ${{ matrix.arch }}
    - name: Cache
      uses: julia-actions/cache@v3
    - name: Cache raster data
      # julia-actions/cache caches the package depot but not scratchspaces, where the raster
      # downloads (~850 MB) and aggregated layers (~700 MB) live. Cache them here (tar preserves
      # mtime, so the aggregate cache — keyed partly on source mtime — still hits). Keyed on the
      # reader tests, which determine what gets downloaded, with a prefix fallback so the newest is
      # restored otherwise. Aggregate correctness across code changes is handled in-code via the
      # cache key's file-content hash, so this key need not track src/ClimatePref/ReadData.jl.
      uses: actions/cache@v6
      with:
        path: ~/.julia/scratchspaces
        key: rasterdata-${{ runner.os }}-${{ hashFiles('test/test_ReadData.jl', 'test/test_AbioticEnv.jl') }}
        restore-keys: |
          rasterdata-${{ runner.os }}-
    - name: Build package
      uses: julia-actions/julia-buildpkg@v1
    - name: Running
      uses: julia-actions/julia-runtest@v1
    - name: Process coverage
      uses: julia-actions/julia-processcoverage@v1
    - name: Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true
